<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluxo de Tarefas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <button id="toggleTheme" class="theme-toggle">🌙</button>

  <div class="container">
    <h1>Fluxo de Tarefas</h1>
    <div id="counter" class="stats-container"></div>

    <input type="text" id="searchInput" placeholder="🔎 Buscar tarefa..." class="search">

    <div class="input-area">
      <input type="text" id="taskInput" placeholder="Digite uma tarefa">
      <button id="addTaskBtn">Adicionar</button>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', event)">Todas</button>
      <button onclick="setFilter('done', event)">Concluídas</button>
      <button onclick="setFilter('pending', event)">Pendentes</button>
    </div>

    <ul id="taskList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
